<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="calculator">

    <!-- Display -->
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="value" id="value">0</div>
    </div>

    <!-- Buttons -->
    <div class="buttons">

 
      <button class="btn-fn"  onclick="press('clear')">AC</button>
      <button class="btn-fn"  onclick="press('sign')">+/−</button>
      <button class="btn-fn"  onclick="press('pct')">%</button>
      <button class="btn-op"  onclick="press('op', '÷')">÷</button>

    
      <button class="btn-num" onclick="press('num', '7')">7</button>
      <button class="btn-num" onclick="press('num', '8')">8</button>
      <button class="btn-num" onclick="press('num', '9')">9</button>
      <button class="btn-op"  onclick="press('op', '×')">×</button>

      <button class="btn-num" onclick="press('num', '4')">4</button>
      <button class="btn-num" onclick="press('num', '5')">5</button>
      <button class="btn-num" onclick="press('num', '6')">6</button>
      <button class="btn-op"  onclick="press('op', '−')">−</button>

     
      <button class="btn-num" onclick="press('num', '1')">1</button>
      <button class="btn-num" onclick="press('num', '2')">2</button>
      <button class="btn-num" onclick="press('num', '3')">3</button>
      <button class="btn-op"  onclick="press('op', '+')">+</button>


      <button class="btn-num btn-zero" onclick="press('num', '0')">0</button>
      <button class="btn-num"          onclick="press('dot')">.</button>
      <button class="btn-eq"           onclick="press('eq')">=</button>

    </div>

    <div class="hint">Keyboard: numbers · + - * / · Enter · Esc · Backspace</div>

  </div>

  <script src="js/script.js"></script>
</body>
</html>
